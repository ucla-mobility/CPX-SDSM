# =====================================================================
# CHANGED (real-world validity): [Config Periodic] sendInterval 1s -> 0.1s
# (10 Hz) per SAE J2945/1. Nakagami fading added in config.xml.
# =====================================================================
[General]
network = networks.TwoCarsScenario
sim-time-limit = 300s

# Deterministic seed for reproducible A/B comparison
seed-set = ${runnumber}
repeat = 3

# PHY models (local config without obstacle shadowing — no building polygons for UCLA)
*.node[*].nic.phy80211p.analogueModels = xmldoc("config.xml")
*.node[*].nic.phy80211p.decider       = xmldoc("config.xml")
*.node[*].nic.phy80211p.antenna = xmldoc("../../veins/examples/veins/antenna.xml", "/root/Antenna[@id='monopole']")
*.node[*].nic.phy80211p.antennaOffsetY = 0 m
*.node[*].nic.phy80211p.antennaOffsetZ = 1.895 m

# --- avoid Qtenv "Unassigned Parameter" popups ---
# (TraCI )
*.node[*].veinsmobility.x = 0
*.node[*].veinsmobility.y = 0
*.node[*].veinsmobility.z = 0

# PHY / MAC parameters (Veins defaults for 802.11p)
*.node[*].nic.phy80211p.usePropagationDelay = true
*.node[*].nic.phy80211p.useNoiseFloor = true
*.node[*].nic.phy80211p.noiseFloor    = -98dBm
*.node[*].nic.phy80211p.minPowerLevel = -110dBm
*.node[*].nic.mac1609_4.txPower       = 20mW



# Use Cmdenv by default. If you want GUI, set Run Config -> User interface: Qtenv
cmdenv-express-mode = true
cmdenv-status-frequency = 1s

# (Optional) If you need ROS to interact with the simulation in real time,
# you can enable the real-time scheduler (otherwise the sim may finish too fast).
# scheduler-class = "cRealTimeScheduler"
# realtime-limit = 1

# Local NED folders for this project.
# NOTE: Veins NED folders should be added via Run Configuration (NED Source Path)
ned-path = .;../src;./apps;./networks

# Result directory (avoids empty scalar/vector file path in some runs)
result-dir = results

# -----------------------------
# World / connection manager
# -----------------------------
*.world.playgroundSizeX = 1300m
*.world.playgroundSizeY = 1000m
*.world.playgroundSizeZ = 50m

*.connectionManager.sendDirect = true
*.connectionManager.maxInterfDist = 300m

# -----------------------------
# TraCI / SUMO (Forker mode)
# - avoids sumo-launchd
# -----------------------------
*.manager.host = "127.0.0.1"
*.manager.port = 9998
*.manager.autoShutdown = true
*.manager.updateInterval = 0.1s

# IMPORTANT: adjust if your SUMO is not under D:/sim/sumo-1.8.0
# (forward slashes are safest in OMNeT++)
#*.manager.commandLine = "D:/sim/sumo-1.8.0/bin/sumo.exe -c ../sumo/scenario.sumo.cfg --remote-port $port"
# Original Windows path (Jiahan):
#*.manager.commandLine = "D:/sim/sumo-1.8.0/bin/sumo-gui.exe -c ../sumo/scenario.sumo.cfg --remote-port $port --start --quit-on-end --log sumo.log --error-log sumo.err.log --message-log sumo.msg.log"
# macOS:
*.manager.commandLine = "/Library/Frameworks/Python.framework/Versions/3.13/bin/sumo -c ../sumo/scenario.sumo.cfg --remote-port $port --start --quit-on-end"



# Dynamically create one OMNeT++ module per SUMO vehicle
*.manager.moduleType = "org.car2x.veins.nodes.Car"
*.manager.moduleName = "node"
#*.manager.moduleDisplayString = "i=block/car;is=vs"

# Set application for all created cars
*.node[*].applType = "apps.RosSDSMApp"
*.node[*].appl.sendInterval = 1s

# --- ROS 2 bridge (UDP, always active) ---
# Every TX/RX event is forwarded to the ROS 2 bridge as a JSON-encoded
# CPX-SDSM SensorDataSharingMessage.  The bridge publishes proper
# sdsm_msgs/SensorDataSharingMessage on ROS 2 topics.
# Each vehicle listens for commands on UDP: (rosCmdPortBase + nodeIndex)
*.node[*].appl.rosControlEnabled = true
*.node[*].appl.rosRemoteHost = "127.0.0.1"
*.node[*].appl.rosCmdPortBase = 50000
*.node[*].appl.rosRemotePort = 50010
*.node[*].appl.rosPollInterval = 0.05s

# If you want ROS to fully control *when* messages are sent, set this to false.
*.node[*].appl.periodicEnabled = true

# =====================================================================
# Greedy dissemination policy defaults (used by Greedy / EventTriggered)
# These can be overridden per-config or per-run.
# =====================================================================
*.node[*].appl.greedyEnabled      = false
*.node[*].appl.greedyTickInterval = 0.1s
*.node[*].appl.greedyAlphaPos     = 1.0
*.node[*].appl.greedyAlphaSpeed   = 0.5
*.node[*].appl.greedyAlphaHeading = 0.1
*.node[*].appl.greedyW1           = 1.0
*.node[*].appl.greedyW2           = 0.5
*.node[*].appl.greedyW3           = 0.3
*.node[*].appl.greedyThreshold    = 1.0
*.node[*].appl.greedyMinInterval  = 0.2s
*.node[*].appl.greedyMaxInterval  = 5.0s
*.node[*].appl.congestionWindow   = 1.0s
*.node[*].appl.redundancyEpsilon  = 0.5

# --- CSV metrics logging ---
*.node[*].appl.csvLoggingEnabled  = true
*.node[*].appl.logPrefix          = "default"
# runNumber embeds seed into CSV filenames for multi-seed experiments
*.node[*].appl.runNumber          = ${runnumber}

# Outputs (filenames relative to result-dir to avoid empty scalar path)
output-scalar-file = scalars.sca
output-vector-file = vectors.vec


# =====================================================================
# A/B/C Experiment: Periodic baseline
# =====================================================================
# CHANGED: sendInterval 1s -> 0.1s (10 Hz) for SAE J2945/1 alignment.
# Only [Config Periodic] is affected; Greedy/EventTriggered use their
# own greedyTickInterval and min/max intervals.
# =====================================================================
[Config Periodic]
description = "Baseline: periodic BSM broadcast at 10 Hz (SAE J2945/1)"

# Periodic mode — 10 Hz (0.1s) per SAE J2945/1 safety applications
*.node[*].appl.greedyEnabled  = false
*.node[*].appl.periodicEnabled = true
*.node[*].appl.sendInterval   = 0.1s

# CSV logging
*.node[*].appl.logPrefix = "Periodic"

# Separate result files (relative to result-dir)
output-scalar-file = Periodic-scalars.sca
output-vector-file = Periodic-vectors.vec


# =====================================================================
# A/B/C Experiment: Greedy event-triggered + AoI + congestion-aware
# =====================================================================
[Config Greedy]
description = "Greedy: event-triggered + AoI freshness + congestion-aware broadcast"

# Greedy mode (periodic disabled; greedy tick handles everything)
*.node[*].appl.greedyEnabled   = true
*.node[*].appl.periodicEnabled = false

# --- Tunable parameters ---
*.node[*].appl.greedyTickInterval = 0.1s
*.node[*].appl.greedyAlphaPos     = 1.0
*.node[*].appl.greedyAlphaSpeed   = 0.5
*.node[*].appl.greedyAlphaHeading = 0.1
*.node[*].appl.greedyW1           = 1.0
*.node[*].appl.greedyW2           = 0.5
*.node[*].appl.greedyW3           = 0.3
*.node[*].appl.greedyThreshold    = 1.0
*.node[*].appl.greedyMinInterval  = 0.2s
*.node[*].appl.greedyMaxInterval  = 5.0s
*.node[*].appl.congestionWindow   = 1.0s
*.node[*].appl.redundancyEpsilon  = 0.5

# CSV logging
*.node[*].appl.logPrefix = "Greedy"

# Separate result files (relative to result-dir)
output-scalar-file = Greedy-scalars.sca
output-vector-file = Greedy-vectors.vec


# =====================================================================
# A/B/C Experiment: Event-triggered ONLY (no AoI proxy, no congestion)
# Purpose: isolate pure "novelty-based" send gain from AoI + congestion.
# =====================================================================
[Config EventTriggered]
description = "Event-triggered only: selfChange utility, no AoI proxy, no congestion penalty"

*.node[*].appl.greedyEnabled   = true
*.node[*].appl.periodicEnabled = false

# w2=0 disables AoI term; w3=0 disables congestion penalty
# => utility = w1 * selfChange only
*.node[*].appl.greedyW1           = 1.0
*.node[*].appl.greedyW2           = 0.0
*.node[*].appl.greedyW3           = 0.0

# Same alpha weights, threshold, and interval guards as Greedy
*.node[*].appl.greedyTickInterval = 0.1s
*.node[*].appl.greedyAlphaPos     = 1.0
*.node[*].appl.greedyAlphaSpeed   = 0.5
*.node[*].appl.greedyAlphaHeading = 0.1
*.node[*].appl.greedyThreshold    = 1.0
*.node[*].appl.greedyMinInterval  = 0.2s
*.node[*].appl.greedyMaxInterval  = 5.0s
*.node[*].appl.congestionWindow   = 1.0s
*.node[*].appl.redundancyEpsilon  = 0.5

*.node[*].appl.logPrefix = "EventTriggered"

output-scalar-file = EventTriggered-scalars.sca
output-vector-file = EventTriggered-vectors.vec


# =====================================================================
# Greedy with ROS 2 (same as Greedy; General has rosControlEnabled=true)
# =====================================================================
[Config GreedyROS]
description = "Greedy event-triggered + AoI + congestion-aware, ROS 2 bridge"

*.node[*].appl.greedyEnabled   = true
*.node[*].appl.periodicEnabled = false
*.node[*].appl.greedyTickInterval = 0.1s
*.node[*].appl.greedyAlphaPos     = 1.0
*.node[*].appl.greedyAlphaSpeed   = 0.5
*.node[*].appl.greedyAlphaHeading = 0.1
*.node[*].appl.greedyW1           = 1.0
*.node[*].appl.greedyW2           = 0.5
*.node[*].appl.greedyW3           = 0.3
*.node[*].appl.greedyThreshold    = 1.0
*.node[*].appl.greedyMinInterval  = 0.2s
*.node[*].appl.greedyMaxInterval  = 5.0s
*.node[*].appl.congestionWindow   = 1.0s
*.node[*].appl.redundancyEpsilon  = 0.5
*.node[*].appl.logPrefix = "GreedyROS"
output-scalar-file = GreedyROS-scalars.sca
output-vector-file = GreedyROS-vectors.vec
